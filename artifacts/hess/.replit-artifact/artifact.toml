kind = "web"
previewPath = "/"
title = "Hess"
version = "1.0.0"
id = "artifacts/hess"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19115

[services.development]
run = "pnpm --filter @workspace/hess run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hess", "run", "build" ]
publicDir = "artifacts/hess/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19115"
BASE_PATH = "/"
